<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>exhibitions — xvarog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Design Tokens ─────────────────────────────────────── */
    :root {
      --color-bg:        #ffffff;
      --color-text:      rgba(0, 0, 0, 0.75);
      --color-text-dark: #000000;
      --color-separator: rgba(0, 0, 0, 0.08);
      --color-border:    rgba(0, 0, 0, 0.08);

      --font:            'Inter', sans-serif;
      --fw-normal:       400;
      --fw-medium:       500;
      --fw-semibold:     600;

      --fs-nav:          14px;
      --fs-body:         15px;
      --fs-exh:          15px;
      --fs-footer:       12px;

      --lh-body:         22px;

      --logo-size:       35px;
      --nav-gap:         90px;

      --h-pad:           80px;
      --nav-height:      85px;
    }

    /* ─── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      width: 100%;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--color-bg);
      font-family: var(--font);
      font-weight: var(--fw-normal);
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ─── Page wrapper ───────────────────────────────────────── */
    .page {
      width: 100%;
      margin: 0 auto;
      background: var(--color-bg);
      flex: 1;
      display: flex;
      flex-direction: column;
      padding-top: var(--nav-height);
    }

    /* ─── Nav ────────────────────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      z-index: 100;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px var(--h-pad);
      font-size: var(--fs-nav);
      color: var(--color-text);
    }

    .nav__left {
      display: flex;
      align-items: center;
      gap: var(--nav-gap);
      flex: 1;
    }

    .nav__logo {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: var(--logo-size);
      height: var(--logo-size);
      flex-shrink: 0;
    }

    .nav__logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .nav__right {
      display: flex;
      align-items: center;
      gap: var(--nav-gap);
      flex: 1;
      justify-content: flex-end;
    }

    .nav__left a,
    .nav__right a {
      white-space: nowrap;
      transition: opacity 0.2s ease;
    }

    .nav__left a:hover,
    .nav__right a:hover { opacity: 0.5; }

    .nav__left a.nav--active,
    .nav__right a.nav--active {
      font-weight: var(--fw-semibold);
      color: var(--color-text-dark);
    }

    /* ─── Hamburger ──────────────────────────────────────────── */
    .nav__hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      flex-direction: column;
      gap: 5px;
    }

    .nav__hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--color-text);
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    /* ─── Mobile menu overlay ────────────────────────────────── */
    .mobile-nav {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--color-bg);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .mobile-nav.is-open {
      opacity: 1;
      pointer-events: all;
    }

    .mobile-nav a {
      font-size: 1.8rem;
      color: var(--color-text);
    }

    .mobile-nav__close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 2rem;
      color: var(--color-text);
      line-height: 1;
    }

    .mobile-nav__logo {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 35px;
      height: 35px;
    }

    .mobile-nav__logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .mobile-nav__social {
      display: flex;
      gap: 20px;
      position: absolute;
      bottom: 135px;
    }

    .mobile-nav__social a {
      opacity: 0.75;
      transition: opacity 0.2s ease;
    }

    .mobile-nav__social a:hover { opacity: 0.35; }

    .mobile-nav__social img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    /* ─── Separator ──────────────────────────────────────────── */
    .separator {
      height: 1px;
      background: var(--color-separator);
      margin: 80px 0 0;
    }

    /* ─── Footer ─────────────────────────────────────────────── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px var(--h-pad) 40px;
      font-size: var(--fs-footer);
      color: var(--color-text);
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer__item { white-space: nowrap; }

    /* ─── Exhibitions layout ─────────────────────────────────── */
    .exhibitions {
      flex: 1;
      display: flex;
      align-items: flex-start;
      gap: 140px;
      padding: 40px var(--h-pad) 0;
      font-size: var(--fs-exh);
      line-height: 22px;
    }

    /* LEFT: Following — sticky column */
    .exh-following {
      flex: 0 0 auto;
      width: 300px;
      position: sticky;
      top: calc(var(--nav-height) + 40px);
      display: flex;
      flex-direction: column;
      gap: 8px;
      color: var(--color-text-dark);
    }

    .exh-following__heading {
      font-size: var(--fs-exh);
      font-weight: var(--fw-normal);
      line-height: 22px;
    }

    .exh-following__event-name {
      font-weight: var(--fw-medium);
      line-height: 22px;
    }

    .exh-following__event-date {
      font-weight: var(--fw-normal);
      line-height: 22px;
    }

    /* RIGHT: Prior column */
    .exh-prior {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      color: var(--color-text-dark);
    }

    .exh-prior__heading {
      font-size: var(--fs-exh);
      font-weight: var(--fw-normal);
      line-height: 22px;
    }

    .exh-entry {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
      width: 100%;
    }

    .exh-entry__text {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .exh-entry__title {
      font-size: var(--fs-exh);
      line-height: 22px;
    }

    .exh-entry__title strong {
      font-weight: var(--fw-medium);
    }

    .exh-entry__photos {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      min-width: 0;
      width: 100%;
    }

    /* Portrait: 3:4 image, flex weight 343 out of 952 total */
    .exh-photo--portrait {
      flex: 343 343 0;
      min-width: 0;
    }

    .exh-photo--portrait img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Landscape: 4:3 image, flex weight 609 out of 952 total */
    .exh-photo--landscape {
      flex: 609 609 0;
      min-width: 0;
    }

    .exh-photo--landscape img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ─── Tablet (≤ 1024px) ──────────────────────────────────── */
    @media (max-width: 1024px) {
      :root {
        --h-pad:      40px;
        --fs-nav:     16px;
        --nav-height: 69px;
      }

      .nav__left,
      .nav__right { display: none; }

      .nav__logo {
        position: static;
        transform: none;
      }

      .nav__hamburger { display: flex; }
      .mobile-nav { display: flex; }

      .nav { justify-content: space-between; padding: 20px var(--h-pad); }

      .exhibitions {
        gap: 60px;
        padding-top: 40px;
      }

      .exh-following {
        width: 280px;
      }

    }

    /* ─── Mobile (≤ 768px) ───────────────────────────────────── */
    @media (max-width: 768px) {
      :root {
        --h-pad:      20px;
        --fs-footer:  11px;
        --nav-height: 65px;
      }

      .exhibitions {
        flex-direction: column;
        gap: 33px;
        padding-top: 40px;
      }

      /* On mobile, Following is NOT sticky — just flows normally */
      .exh-following {
        width: 100%;
        position: static;
        top: auto;
        gap: 8px;
      }

      .exh-prior {
        gap: 8px;
      }

      .exh-entry {
        gap: 16px;
      }

      /* On mobile: photos stack vertically, max 2 shown by default */
      .exh-entry__photos {
        flex-direction: column;
        gap: 10px;
      }

      .exh-photo--portrait,
      .exh-photo--landscape {
        width: 100%;
        flex: none;
      }

      /* Extra photos hidden on mobile until "see more" clicked */
      .exh-photo--extra {
        display: none;
      }

      .exh-photo--extra.is-visible {
        display: block;
      }

      /* See more / see less toggle */
      .exh-see-more {
        display: inline-block;
        font-size: var(--fs-body);
        color: var(--color-text);
        text-decoration: underline;
        cursor: pointer;
        background: none;
        border: none;
        padding: 0;
        font-family: var(--font);
        margin-top: 4px;
      }

      .footer {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 14px;
        padding-bottom: 20px;
      }

      .separator { margin: 40px 0 0; }

      .mobile-nav a { font-size: 1.5rem; }
    }

    /* Hide see-more button on desktop */
    @media (min-width: 769px) {
      .exh-see-more { display: none !important; }
      .exh-photo--extra { display: block !important; }
    }
  </style>
</head>
<body>

  <!-- Mobile nav overlay -->
  <div class="mobile-nav" id="mobileNav" role="dialog" aria-modal="true" aria-label="Navigation menu">
    <a href="/" class="mobile-nav__logo" onclick="closeMenu()">
      <img src="https://kasmeks.github.io/xvarog/images/logo.png" alt="xvarog logo" />
    </a>
    <button class="mobile-nav__close" onclick="closeMenu()" aria-label="Close menu">×</button>
    <a href="/about" onclick="closeMenu()">about</a>
    <a href="/exhibitions" onclick="closeMenu()">exhibitions</a>
    <a href="/custom" onclick="closeMenu()">custom</a>
    <a href="/archive" onclick="closeMenu()">archive</a>
    <div class="mobile-nav__social">
      <a href="mailto:contact@xvarog.com" aria-label="Email xvarog">
        <img src="https://kasmeks.github.io/xvarog/images/email.png" alt="Email" />
      </a>
      <a href="https://www.instagram.com/xvarog" target="_blank" rel="noopener" aria-label="xvarog on Instagram">
        <img src="https://kasmeks.github.io/xvarog/images/instagram.png" alt="Instagram" />
      </a>
    </div>
  </div>

  <div class="page">

    <!-- Nav -->
    <nav class="nav" aria-label="Main navigation">
      <div class="nav__left">
        <a href="/about">about</a>
        <a href="/exhibitions" class="nav--active">exhibitions</a>
      </div>
      <div class="nav__logo">
        <a href="/"><img src="https://kasmeks.github.io/xvarog/images/logo.png" alt="xvarog logo" /></a>
      </div>
      <div class="nav__right">
        <a href="/custom">custom</a>
        <a href="/archive">archive</a>
      </div>
      <button
        class="nav__hamburger"
        id="hamburgerBtn"
        aria-label="Open navigation menu"
        aria-expanded="false"
        aria-controls="mobileNav"
        onclick="openMenu()"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>

    <!-- Exhibitions content -->
    <main class="exhibitions">

      <!-- LEFT: Following (sticky on desktop) -->
      <section class="exh-following" aria-label="Upcoming exhibitions">
        <p class="exh-following__heading">FOLLOWING</p>
        <div>
          <p class="exh-following__event-name">Antwerp Jewellery Week</p>
          <p class="exh-following__event-date">1–4 October 2026 (Antwerp, Belgium)</p>
        </div>
      </section>

      <!-- RIGHT: Prior exhibitions -->
      <section class="exh-prior" aria-label="Past exhibitions">
        <p class="exh-prior__heading">PRIOR</p>

        <!-- Entry: AUTOR -->
        <div class="exh-entry">
          <div class="exh-entry__text">
            <p class="exh-entry__title"><strong>AUTOR Contemporary Jewelry</strong> – Selected Young Designer</p>
            <p class="exh-entry__title">15–17 May 2026 (Bucharest, Romania)</p>
          </div>
          <div class="exh-entry__photos">
            <!-- Photo 1: portrait (shown on mobile by default) -->
            <div class="exh-photo--portrait">
              <img
                src="https://kasmeks.github.io/xvarog/images/exhibitions-autor-portrait.jpg"
                alt="Kseniia standing at the xvarog booth at AUTOR fair, Bucharest"
              />
            </div>
            <!-- Photo 2: landscape (shown on mobile by default, max 2) -->
            <div class="exh-photo--landscape">
              <img
                src="https://kasmeks.github.io/xvarog/images/exhibitions-autor-table.jpg"
                alt="xvarog jewelry display table at AUTOR fair, Bucharest"
              />
            </div>
            <!-- Additional photos beyond 2 go here with class exh-photo--extra -->
          </div>
          <!-- See more / less toggle (mobile only, shown if more than 2 photos) -->
          <!-- Uncomment when more photos are added:
          <button class="exh-see-more" id="autorToggle" onclick="togglePhotos('autor')">see more</button>
          -->
        </div>

        <!-- Future prior entries go here -->

      </section>

    </main>

    <div class="separator" role="separator"></div>

    <footer class="footer">
      <a href="/care" class="footer__item">CARE</a>
      <a href="/shipping" class="footer__item">SHIPPING AND RETURNS</a>
      <a href="/datenschutz" class="footer__item">DATENSCHUTZ</a>
      <a href="/impressum" class="footer__item">IMPRESSUM</a>
      <span class="footer__item">© XVAROG 2026</span>
    </footer>

  </div>

  <script>
    function openMenu() {
      const nav = document.getElementById('mobileNav');
      const btn = document.getElementById('hamburgerBtn');
      nav.classList.add('is-open');
      btn.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';
    }

    function closeMenu() {
      const nav = document.getElementById('mobileNav');
      const btn = document.getElementById('hamburgerBtn');
      nav.classList.remove('is-open');
      btn.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeMenu();
    });

    // Toggle extra photos on mobile
    function togglePhotos(entryId) {
      const btn = document.getElementById(entryId + 'Toggle');
      const extras = document.querySelectorAll('.' + entryId + '-extra');
      const isOpen = btn.textContent === 'see less';
      extras.forEach(function(el) {
        el.classList.toggle('is-visible', !isOpen);
      });
      btn.textContent = isOpen ? 'see more' : 'see less';
    }
  </script>

</body>
</html>
