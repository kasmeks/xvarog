<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>archive — xvarog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Design Tokens ─────────────────────────────────────── */
    :root {
      --color-bg:        #ffffff;
      --color-text:      rgba(0, 0, 0, 0.75);
      --color-text-dark: #000000;
      --color-text-year: #82808d;
      --color-separator: rgba(0, 0, 0, 0.08);
      --color-border:    rgba(0, 0, 0, 0.08);

      --font:            'Inter', sans-serif;
      --fw-normal:       400;
      --fw-semibold:     600;

      --fs-nav:          14px;
      --fs-caption:      13px;
      --fs-footer:       12px;

      --logo-size:       35px;
      --nav-gap:         90px;

      --h-pad:           80px;
      --nav-height:      85px;

      --col-gap:         46px;
    }

    /* ─── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      width: 100%;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--color-bg);
      font-family: var(--font);
      font-weight: var(--fw-normal);
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ─── Page wrapper ───────────────────────────────────────── */
    .page {
      max-width: var(--max-width);
      width: 100%;
      margin: 0 auto;
      background: var(--color-bg);
      flex: 1;
      display: flex;
      flex-direction: column;
      padding-top: var(--nav-height);
    }

    /* ─── Nav ────────────────────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: var(--max-width);
      z-index: 100;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px var(--h-pad);
      font-size: var(--fs-nav);
      color: var(--color-text);
    }

    .nav__left {
      display: flex;
      align-items: center;
      gap: var(--nav-gap);
      flex: 1;
    }

    .nav__logo {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: var(--logo-size);
      height: var(--logo-size);
      flex-shrink: 0;
    }

    .nav__logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .nav__right {
      display: flex;
      align-items: center;
      gap: var(--nav-gap);
      flex: 1;
      justify-content: flex-end;
    }

    .nav__left a,
    .nav__right a {
      white-space: nowrap;
      transition: opacity 0.2s ease;
    }

    .nav__left a:hover,
    .nav__right a:hover { opacity: 0.5; }

    .nav--active {
      font-weight: var(--fw-semibold);
      color: var(--color-text-dark);
    }

    /* Hamburger */
    .nav__hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      flex-direction: column;
      gap: 5px;
    }

    .nav__hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--color-text);
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    /* ─── Archive layout ─────────────────────────────────────── */
    .archive {
      padding: 40px var(--h-pad) 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 19px;
    }

    /* Caption shared */
    .archive__caption {
      font-size: var(--fs-caption);
      line-height: 16px;
      color: var(--color-text-dark);
    }

    .archive__caption .year { color: var(--color-text-year); }
    .archive__caption--right { text-align: right; }
    .archive__caption--left  { text-align: left; }

    /* ── Row 1: columns proportional to natural image ratios → equal height, no crop ── */
    /* earrings 992/1040=0.954  |  fur-ring 868/1040=0.835  |  tooth 1386/1040=1.333  */
    .archive__row-top {
      display: grid;
      grid-template-columns: 954fr 835fr 1333fr;
      gap: 46px;
      align-items: end;
    }

    .archive__item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .archive__item img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── Row 2: two columns (897fr : 777fr) ── */
    .archive__row-bottom {
      display: grid;
      grid-template-columns: 897fr 777fr;
      gap: 0 var(--col-gap);
      align-items: start;
    }

    .archive__left {
      display: flex;
      flex-direction: column;
      gap: 19px;
    }

    .archive__left-bottom {
      padding-right: 200px;
    }

    /* Right column: single tall image stretching to match left height */
    .archive__right {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-self: stretch;
    }

    .archive__right__img-wrap {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .archive__right__img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* ─── Separator ──────────────────────────────────────────── */
    .separator {
      height: 1px;
      background: var(--color-separator);
      margin: 80px 0 0;
    }

    /* ─── Footer ─────────────────────────────────────────────── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px var(--h-pad) 40px;
      font-size: var(--fs-footer);
      color: var(--color-text);
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer__item { white-space: nowrap; }

    /* ─── Mobile menu overlay ────────────────────────────────── */
    .mobile-nav {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--color-bg);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .mobile-nav.is-open {
      opacity: 1;
      pointer-events: all;
    }

    .mobile-nav a {
      font-size: 1.8rem;
      color: var(--color-text);
    }

    .mobile-nav__close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 2rem;
      color: var(--color-text);
      line-height: 1;
    }

    .mobile-nav__logo {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 35px;
      height: 35px;
    }

    .mobile-nav__logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .mobile-nav__social {
      display: flex;
      gap: 20px;
      position: absolute;
      bottom: 135px;
    }

    .mobile-nav__social a {
      opacity: 0.75;
      transition: opacity 0.2s ease;
    }

    .mobile-nav__social a:hover { opacity: 0.35; }

    .mobile-nav__social img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    /* ─── Tablet (≤ 1024px) ──────────────────────────────────── */
    @media (max-width: 1024px) {
      :root {
        --h-pad:      40px;
        --fs-nav:     16px;
        --nav-height: 69px;
        --col-gap:    28px;
      }

      .nav__left,
      .nav__right { display: none; }

      .nav__logo {
        position: static;
        transform: none;
      }

      .nav__hamburger { display: flex; }
      .mobile-nav { display: flex; }

      .nav { justify-content: space-between; padding: 20px var(--h-pad); }

      .archive__left-bottom { padding-right: 80px; }
    }

    /* ─── Mobile (≤ 768px) ───────────────────────────────────── */
    @media (max-width: 768px) {
      :root {
        --h-pad:      20px;
        --fs-caption: 13px;
        --fs-footer:  11px;
        --nav-height: 65px;
      }

      .archive {
        gap: 40px;
        padding-top: 40px;
      }

      /* Top row: single column on mobile */
      .archive__row-top {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      /* Bottom section: single column */
      .archive__row-bottom {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      /* Extension comes before keychain/wildboar on mobile */
      .archive__right {
        order: -1;
        align-self: auto;
      }

      .archive__left {
        order: 0;
        gap: 40px;
      }

      .archive__right__img-wrap {
        flex: none;
        height: auto;
      }

      .archive__right__img-wrap img {
        height: auto;
      }

      .archive__left-bottom { padding-right: 0; }

      .archive__caption--right { text-align: left; }

      .footer {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 14px;
        padding-bottom: 20px;
      }

      .separator { margin: 40px 0 0; }

      .mobile-nav a { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- Mobile nav overlay -->
  <div class="mobile-nav" id="mobileNav" role="dialog" aria-modal="true" aria-label="Navigation menu">
    <a href="/" class="mobile-nav__logo" onclick="closeMenu()">
      <img src="https://kasmeks.github.io/xvarog/images/logo.png" alt="xvarog logo" />
    </a>
    <button class="mobile-nav__close" onclick="closeMenu()" aria-label="Close menu">×</button>
    <a href="/about" onclick="closeMenu()">about</a>
    <a href="/shop" onclick="closeMenu()">shop</a>
    <a href="/custom" onclick="closeMenu()">custom</a>
    <a href="/archive" onclick="closeMenu()">archive</a>
    <div class="mobile-nav__social">
      <a href="mailto:contact@xvarog.com" aria-label="Email xvarog">
        <img src="https://kasmeks.github.io/xvarog/images/email.png" alt="Email" />
      </a>
      <a href="https://www.instagram.com/xvarog" target="_blank" rel="noopener" aria-label="xvarog on Instagram">
        <img src="https://kasmeks.github.io/xvarog/images/instagram.png" alt="Instagram" />
      </a>
    </div>
  </div>

  <div class="page">

    <!-- Nav -->
    <nav class="nav" aria-label="Main navigation">
      <div class="nav__left">
        <a href="/about">about</a>
        <a href="/shop">shop</a>
      </div>
      <div class="nav__logo">
        <a href="/"><img
          src="https://kasmeks.github.io/xvarog/images/logo.png"
          alt="xvarog logo"
        /></a>
      </div>
      <div class="nav__right">
        <a href="/custom">custom</a>
        <a href="/archive" class="nav--active">archive</a>
      </div>
      <button
        class="nav__hamburger"
        id="hamburgerBtn"
        aria-label="Open navigation menu"
        aria-expanded="false"
        aria-controls="mobileNav"
        onclick="openMenu()"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>

    <!-- Archive content -->
    <main class="archive">

      <!-- Row 1: three new 2026 pieces -->
      <div class="archive__row-top">

        <!-- 1. Horsehair earrings — ONCE, 2026 -->
        <div class="archive__item">
          <a href="https://xvarog.com/once">
            <img
              src="https://kasmeks.github.io/xvarog/images/horsehair-earrings-black-display.jpg"
              alt="ONCE — xvarog 2026"
            />
          </a>
          <p class="archive__caption archive__caption--right">
            <a href="https://xvarog.com/once"><u>ONCE, <span class="year">2026</span></u></a>
          </p>
        </div>

        <!-- 2. Fur ring — SHELL, 2026 -->
        <div class="archive__item">
          <a href="https://xvarog.com/shell">
            <img
              src="https://kasmeks.github.io/xvarog/images/fur-ring-top-view-gray-bg.jpg"
              alt="SHELL — xvarog 2026"
            />
          </a>
          <p class="archive__caption archive__caption--right">
            <a href="https://xvarog.com/shell"><u>SHELL, <span class="year">2026</span></u></a>
          </p>
        </div>

        <!-- 3. Tooth pendant on pillow — DEAR FRIEND, 2026 -->
        <div class="archive__item">
          <a href="https://xvarog.com/dear-friend">
            <img
              src="https://kasmeks.github.io/xvarog/images/tooth-pendant-pillow-shadow.jpg"
              alt="DEAR FRIEND — xvarog 2026"
            />
          </a>
          <p class="archive__caption archive__caption--right">
            <a href="https://xvarog.com/dear-friend"><u>DEAR FRIEND, <span class="year">2026</span></u></a>
          </p>
        </div>

      </div>

      <!-- Row 2: existing pieces -->
      <div class="archive__row-bottom">

        <!-- Left column: keychain + wild boar (desktop) -->
        <!-- On mobile: order:0, comes after extension -->
        <div class="archive__left">

          <!-- 5. Keychain landscape -->
          <div class="archive__item">
            <a href="https://xvarog.com/keychain">
              <img
                src="https://kasmeks.github.io/xvarog/images/archive-keychain.JPG"
                alt="KEYCHAIN — xvarog 2025"
              />
            </a>
            <p class="archive__caption archive__caption--right">
              <a href="https://xvarog.com/keychain"><u>KEYCHAIN, <span class="year">2025</span></u></a>
            </p>
          </div>

          <!-- 6. Wild boar small -->
          <div class="archive__item archive__left-bottom">
            <a href="https://xvarog.com/wildboar">
              <img
                src="https://kasmeks.github.io/xvarog/images/archive-wildboar.jpg"
                alt="WILD BOAR (KEYCHAIN) — xvarog 2025"
              />
            </a>
            <p class="archive__caption archive__caption--left">
              <a href="https://xvarog.com/wildboar"><u>WILD BOAR (KEYCHAIN), <span class="year">2025</span></u></a>
            </p>
          </div>

        </div>

        <!-- Right column: Extension tall -->
        <!-- On mobile: order:-1, comes before keychain/wildboar -->
        <div class="archive__right">
          <div class="archive__right__img-wrap">
            <a href="https://xvarog.com/extension">
              <img
                src="https://kasmeks.github.io/xvarog/images/archive-extension.jpg"
                alt="EXTENSION — xvarog 2026"
              />
            </a>
          </div>
          <p class="archive__caption archive__caption--left">
            <a href="https://xvarog.com/extension"><u>EXTENSION, <span class="year">2026</span></u></a>
          </p>
        </div>

      </div>

    </main>

    <div class="separator" role="separator"></div>

    <footer class="footer">
      <a href="/care" class="footer__item">CARE</a>
      <a href="/shipping" class="footer__item">SHIPPING AND RETURNS</a>
      <a href="/datenschutz" class="footer__item">DATENSCHUTZ</a>
      <a href="/impressum" class="footer__item">IMPRESSUM</a>
      <span class="footer__item">© XVAROG 2026</span>
    </footer>

  </div>

  <script>
    function openMenu() {
      const nav = document.getElementById('mobileNav');
      const btn = document.getElementById('hamburgerBtn');
      nav.classList.add('is-open');
      btn.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';
    }

    function closeMenu() {
      const nav = document.getElementById('mobileNav');
      const btn = document.getElementById('hamburgerBtn');
      nav.classList.remove('is-open');
      btn.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeMenu();
    });
  </script>

</body>
</html>
