<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EXTENSION — xvarog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Design Tokens ─────────────────────────────────────── */
    :root {
      --color-bg:        #ffffff;
      --color-text:      rgba(0, 0, 0, 0.75);
      --color-text-dark: #000000;
      --color-separator: rgba(0, 0, 0, 0.08);
      --color-border:    rgba(0, 0, 0, 0.08);

      --font:            'Inter', sans-serif;
      --fw-normal:       400;
      --fw-semibold:     600;

      --fs-nav:          14px;
      --fs-body:         15px;
      --fs-footer:       12px;

      --lh-body:         22px;

      --logo-size:       35px;
      --nav-gap:         90px;

      --max-width:       1440px;
      --h-pad:           80px;
      --nav-height:      65px;

      /* ─── Page-specific tokens ───────────────────────────── */
      --color-meta:      #82808d;
      --thumb-width:      75px;
      --thumb-height:     100px;
      --thumb-gap:       14px;
    }

    /* ─── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      width: 100%;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--color-bg);
      font-family: var(--font);
      font-weight: var(--fw-normal);
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ─── Page wrapper ───────────────────────────────────────── */
    .page {
      max-width: var(--max-width);
      width: 100%;
      margin: 0 auto;
      background: var(--color-bg);
      flex: 1;
      display: flex;
      flex-direction: column;
      padding-top: var(--nav-height);
    }

    /* ─── Nav ────────────────────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: var(--max-width);
      z-index: 100;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px var(--h-pad);
      font-size: var(--fs-nav);
      color: var(--color-text);
    }

    .nav__left {
      display: flex;
      align-items: center;
      gap: var(--nav-gap);
      flex: 1;
    }

    .nav__logo {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: var(--logo-size);
      height: var(--logo-size);
      flex-shrink: 0;
    }

    .nav__logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .nav__right {
      display: flex;
      align-items: center;
      gap: var(--nav-gap);
      flex: 1;
      justify-content: flex-end;
    }

    .nav__left a,
    .nav__right a {
      white-space: nowrap;
      transition: opacity 0.2s ease;
    }

    .nav__left a:hover,
    .nav__right a:hover { opacity: 0.5; }

    .nav__left a.nav--active,
    .nav__right a.nav--active {
      font-weight: var(--fw-semibold);
      color: var(--color-text-dark);
    }

    /* ─── Hamburger ──────────────────────────────────────────── */
    .nav__hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      flex-direction: column;
      gap: 5px;
    }

    .nav__hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--color-text);
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    /* ─── Mobile menu overlay ────────────────────────────────── */
    .mobile-nav {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--color-bg);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .mobile-nav.is-open {
      opacity: 1;
      pointer-events: all;
    }

    .mobile-nav a {
      font-size: 1.8rem;
      color: var(--color-text);
    }

    .mobile-nav__close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 2rem;
      color: var(--color-text);
      line-height: 1;
    }

    .mobile-nav__logo {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 35px;
      height: 35px;
    }

    .mobile-nav__logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .mobile-nav__social {
      display: flex;
      gap: 20px;
      position: absolute;
      bottom: 155px;
    }

    .mobile-nav__social a {
      opacity: 0.75;
      transition: opacity 0.2s ease;
    }

    .mobile-nav__social a:hover { opacity: 0.35; }

    .mobile-nav__social img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    /* ─── Separator ──────────────────────────────────────────── */
    .separator {
      height: 1px;
      background: var(--color-separator);
      margin: 80px 0 0;
    }

    /* ─── Footer ─────────────────────────────────────────────── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px var(--h-pad) 40px;
      font-size: var(--fs-footer);
      color: var(--color-text);
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer__item { white-space: nowrap; }

    /* ─── PAGE-SPECIFIC STYLES ───────────────────────────────── */
    .content {
      padding: 40px var(--h-pad) 0;
      flex: 1;
      font-size: var(--fs-body);
      line-height: var(--lh-body);
      color: var(--color-text-dark);
    }

    /* ─── Product layout ─────────────────────────────────────── */
    .product {
      display: grid;
      grid-template-columns: 37% 1fr;
      gap: 45px;
      align-items: start;
    }

    /* ─── Left: image viewer ─────────────────────────────────── */
    .product__viewer {
      display: flex;
      flex-direction: column;
      gap: var(--thumb-gap);
      min-width: 0;

    }

      .product__main-image {
        width: 100%;
        overflow: hidden;
        position: relative;
      }

      .product__main-image img {
        width: 100%;
        height: calc(100vh - var(--nav-height) - 45px - 33px);
        display: block;
        object-fit: cover;
        object-position: center;
      }

      #mainImageBg {
        position: absolute;
        inset: 0;
        z-index: 0;
        transition: none;
      }

      #mainImage {
        position: relative;
        z-index: 1;
        transition: opacity 0.25s ease;
      }

    .product__thumbnails {
      display: flex;
      gap: var(--thumb-gap);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .product__thumbnails::-webkit-scrollbar {
      display: none;
    }

    .product__thumbnails-track {
      position: relative;
      overflow: hidden;
      min-width: 0;
      width: 100%;
    }

    .product__thumbnails-track::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 80px;
      height: 100%;
      background: linear-gradient(to right, transparent 0%, transparent 50%, #f9f9f9 100%);
      pointer-events: none;
      z-index: 1;
    }

    .product__thumb {
      width: var(--thumb-width);
      height: var(--thumb-height);
      overflow: hidden;
      cursor: pointer;
      opacity: 1;
      transition: opacity 0.2s ease;
      flex-shrink: 0;
      background: none;
      border: none;
      padding: 0;
    }

    .product__thumb:hover { opacity: 0.75; }

    .product__thumb.is-active { opacity: 0.45; }

    .product__thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ─── Right: info ────────────────────────────────────────── */
    .product__info {
      position: sticky;
      top: calc(var(--nav-height) + 5px);
      display: flex;
      flex-direction: column;
    }

    .product__header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      line-height: var(--lh-body);
    }

    .product__title {
      font-size: var(--fs-body);
      font-weight: var(--fw-normal);
      color: var(--color-text-dark);
      line-height: var(--lh-body);
    }

    .product__date {
      font-size: var(--fs-body);
      font-weight: var(--fw-normal);
      color: var(--color-meta);
      line-height: var(--lh-body);
      white-space: nowrap;
    }

    .product__meta {
      margin-top: 0;
    }

    .product__meta-line {
      font-size: var(--fs-body);
      font-weight: var(--fw-normal);
      color: var(--color-text);
      line-height: var(--lh-body);
    }

    /* ─── Tablet (≤ 1024px) ──────────────────────────────────── */
    @media (max-width: 1024px) {
      :root {
        --h-pad:      40px;
        --fs-nav:     16px;
        --fs-body:    16px;
        --nav-height: 69px;
      }

      .nav__left,
      .nav__right { display: none; }

      .nav__logo {
        position: static;
        transform: none;
      }

      .nav__hamburger { display: flex; }
      .mobile-nav { display: flex; }

      .nav { justify-content: space-between; padding: 20px var(--h-pad); }

      .product { gap: 40px; }
    }

    /* ─── Mobile (≤ 768px) ───────────────────────────────────── */
    @media (max-width: 768px) {
      :root {
        --h-pad:      20px;
        --fs-body:    15px;
        --fs-footer:  11px;
        --nav-height: 75px;
      }

      .content { padding: 12px var(--h-pad) 0; }

      .product {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .product__info {
        position: static;
      }

      .product__main-image img {
        height: auto;
        width: 100%;
        object-fit: cover;
      }

      .product__viewer {
        gap: 6px;
      }

      .footer {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 14px;
        padding-bottom: 20px;
      }

      .separator { margin: 40px 0 0; }

      .mobile-nav a { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- Mobile nav overlay -->
  <div class="mobile-nav" id="mobileNav" role="dialog" aria-modal="true" aria-label="Navigation menu">
    <a href="/" class="mobile-nav__logo" onclick="closeMenu()">
      <img src="https://kasmeks.github.io/xvarog/images/logo.png" alt="xvarog logo" />
    </a>
    <button class="mobile-nav__close" onclick="closeMenu()" aria-label="Close menu">×</button>
    <a href="/about" onclick="closeMenu()">about</a>
    <a href="/shop" onclick="closeMenu()">shop</a>
    <a href="/custom" onclick="closeMenu()">custom</a>
    <a href="/archive" onclick="closeMenu()">archive</a>
    <div class="mobile-nav__social">
      <a href="mailto:contact@xvarog.com" aria-label="Email xvarog">
        <img src="https://kasmeks.github.io/xvarog/images/email.png" alt="Email" />
      </a>
      <a href="https://www.instagram.com/xvarog" target="_blank" rel="noopener" aria-label="xvarog on Instagram">
        <img src="https://kasmeks.github.io/xvarog/images/instagram.png" alt="Instagram" />
      </a>
    </div>
  </div>

  <div class="page">

    <!-- Nav -->
    <nav class="nav" aria-label="Main navigation">
      <div class="nav__left">
        <a href="/about">about</a>
        <a href="/shop" class="nav--active">shop</a>
      </div>
      <div class="nav__logo">
        <a href="/"><img src="https://kasmeks.github.io/xvarog/images/logo.png" alt="xvarog logo" /></a>
      </div>
      <div class="nav__right">
        <a href="/custom">custom</a>
        <a href="/archive">archive</a>
      </div>
      <button
        class="nav__hamburger"
        id="hamburgerBtn"
        aria-label="Open navigation menu"
        aria-expanded="false"
        aria-controls="mobileNav"
        onclick="openMenu()"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>

    <!-- ═══════════════════════════════════════════════════════ -->
    <main class="content">
      <div class="product">

        <!-- Left: image viewer -->
        <div class="product__viewer">
            <div class="product__main-image">
            <img
              id="mainImageBg"
              src="https://kasmeks.github.io/xvarog/images/extension_clasp_flatlay.jpg"
              alt=""
              aria-hidden="true"
            />
            <img
              id="mainImage"
              src="https://kasmeks.github.io/xvarog/images/extension_clasp_flatlay.jpg"
              alt="EXTENSION neckpiece — white horse leather collar with braided extension and silver clasp"
            />
          </div>
            <div class="product__thumbnails-track">
              <div class="product__thumbnails">
                <button class="product__thumb is-active" onclick="setImage(this, 'https://kasmeks.github.io/xvarog/images/extension_clasp_flatlay.jpg')" aria-label="Image 1">
                  <img src="https://kasmeks.github.io/xvarog/images/extension_clasp_flatlay.jpg" alt="Fur band with silver clasp, flat lay on black" />
                </button>
                <button class="product__thumb" onclick="setImage(this, 'https://kasmeks.github.io/xvarog/images/extension_band_flatlay.jpg')" aria-label="Image 1">
                  <img src="https://kasmeks.github.io/xvarog/images/extension_band_flatlay.jpg" alt="Fur band with silver clasp, flat lay on black" />
                </button>
                <button class="product__thumb" onclick="setImage(this, 'https://kasmeks.github.io/xvarog/images/extension_clasp_detail.jpg')" aria-label="Image 3">
                  <img src="https://kasmeks.github.io/xvarog/images/extension_clasp_detail.jpg" alt="Extreme close-up of the ornate silver clasp on white fur" />
                </button>
                <button class="product__thumb" onclick="setImage(this, 'https://kasmeks.github.io/xvarog/images/extension_worn_back_01.jpg')" aria-label="Image 4">
                  <img src="https://kasmeks.github.io/xvarog/images/extension_worn_back_01.jpg" alt="Worn from behind, loose braid down spine, black fitted top" />
                </button>
                <button class="product__thumb" onclick="setImage(this, 'https://kasmeks.github.io/xvarog/images/extension_worn_back_02.jpg')" aria-label="Image 5">
                  <img src="https://kasmeks.github.io/xvarog/images/extension_worn_back_02.jpg" alt="Worn from behind, braid down spine, black tank top" />
                </button>
                <button class="product__thumb" onclick="setImage(this, 'https://kasmeks.github.io/xvarog/images/extension_worn_front.jpg')" aria-label="Image 6">
                  <img src="https://kasmeks.github.io/xvarog/images/extension_worn_front.jpg" alt="Worn front-facing, clasp detail on throat" />
                </button>
              </div>
            </div>
        </div>
        <!-- Right: product info -->
        <div class="product__info">
          <div class="product__header">
            <h1 class="product__title">EXTENSION</h1>
            <span class="product__date">jan 2026</span>
          </div>
          <div class="product__meta">
            <p class="product__meta-line">neckpiece</p>
            <p class="product__meta-line">leather of a white horse, silver 925</p>
            <p class="product__meta-line">17 hrs</p>
          </div>
        </div>

      </div>
    </main>
    <!-- ═══════════════════════════════════════════════════════ -->

    <div class="separator" role="separator"></div>

    <footer class="footer">
      <a href="/care" class="footer__item">CARE</a>
      <a href="/shipping" class="footer__item">SHIPPING AND RETURNS</a>
      <a href="/datenschutz" class="footer__item">DATENSCHUTZ</a>
      <a href="/impressum" class="footer__item">IMPRESSUM</a>
      <span class="footer__item">© XVAROG 2026</span>
    </footer>

  </div>

<script>
  function openMenu() {
    const nav = document.getElementById('mobileNav');
    const btn = document.getElementById('hamburgerBtn');
    nav.classList.add('is-open');
    btn.setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
  }

  function closeMenu() {
    const nav = document.getElementById('mobileNav');
    const btn = document.getElementById('hamburgerBtn');
    nav.classList.remove('is-open');
    btn.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeMenu();
  });

  function setImage(btn, src) {
  var top = document.getElementById('mainImage');
  var bg = document.getElementById('mainImageBg');
  bg.src = src;
  setTimeout(function() {
    top.style.opacity = '0';
    setTimeout(function() {
      top.src = src;
      top.style.opacity = '1';
    }, 250);
  }, 20);
  document.querySelectorAll('.product__thumb').forEach(function(t) {
    t.style.opacity = '1';
  });
  btn.style.opacity = '0.45';
  }

  document.addEventListener('DOMContentLoaded', function() {
    document.querySelector('.product__thumb').style.opacity = '0.45';
  });
</script>

</body>
</html>
